name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore AI Code Reviewer dependencies
        run: dotnet restore tools/AICodeReviewer/AICodeReviewer.csproj

      - name: Build AI Code Reviewer
        run: dotnet build tools/AICodeReviewer/AICodeReviewer.csproj --configuration Release --no-restore

      - name: Run AI Code Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet run --project tools/AICodeReviewer/AICodeReviewer.csproj -- \
            --pr-number ${{ github.event.pull_request.number }} \
            --owner ${{ github.repository_owner }} \
            --repo ${{ github.event.repository.name }} \
            --commit-sha ${{ github.event.pull_request.head.sha }}

      - name: Comment on PR if review fails
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ AI Code Review failed. Please check the workflow logs for details.'
            })
